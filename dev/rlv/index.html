<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>brain.rlv.lol</title>
<style>
  :root {
    --bg: #0a0a0c;
    --surface: #131316;
    --border: #222228;
    --text: #d0d0d8;
    --text-dim: #60606a;
    --accent: #c4826e;
    --font: 'IBM Plex Mono', 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .gate {
    width: 100%;
    max-width: 360px;
    padding: 2rem 1.5rem;
    border: 1px solid var(--border);
    background: var(--surface);
  }
  .label {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 1.5rem;
  }
  .wordmark {
    font-size: 1.4rem;
    letter-spacing: 0.04em;
    margin-bottom: 2rem;
    color: var(--accent);
  }
  input[type="password"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    padding: 0.6rem 0.75rem;
    outline: none;
    margin-bottom: 0.75rem;
  }
  input[type="password"]:focus { border-color: var(--accent); }
  button {
    width: 100%;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--font);
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.6rem;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: rgba(196,130,110,0.1); }
  .err {
    font-size: 10px;
    color: #c46a5a;
    margin-top: 0.5rem;
    min-height: 1.2em;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
<div class="gate">
  <div class="label">RL Ventures LLC &nbsp;·&nbsp; Restricted</div>
  <div class="wordmark">brain</div>
  <input type="password" id="pw" placeholder="passphrase" autofocus>
  <button onclick="attempt()">enter</button>
  <div class="err" id="err"></div>
</div>
<script>
  // sha256('brains') — still theater, but less embarrassing theater. Real auth = Cloudflare Worker (deferred).
  const PW_HASH = '44de9b7b036b9b8d28f364fa364b76b7af64d9e0b9efe17d7536033772a04871';

  async function sha256Hex(s) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  if (sessionStorage.getItem('brain_auth') === '1') location.replace('main.html');

  async function attempt() {
    const v = document.getElementById('pw').value;
    const h = await sha256Hex(v);
    if (h === PW_HASH) {
      sessionStorage.setItem('brain_auth', '1');
      location.replace('main.html');
    } else {
      document.getElementById('err').textContent = 'incorrect passphrase';
      document.getElementById('pw').value = '';
      document.getElementById('pw').focus();
    }
  }
  document.getElementById('pw').addEventListener('keydown', e => {
    if (e.key === 'Enter') attempt();
  });
</script>
</body>
</html>
